# ─────────────────────────────────────────────────────────────
# netszukacz.pl — Nginx (frontend SPA + reverse proxy do Kong)
# ─────────────────────────────────────────────────────────────

# 1) Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name netszukacz.pl www.netszukacz.pl api.netszukacz.pl studio.netszukacz.pl;
    return 301 https://$host$request_uri;
}

# 2) FRONTEND — https://netszukacz.pl
server {
    listen 443 ssl http2;
    server_name netszukacz.pl www.netszukacz.pl;

    ssl_certificate     /etc/letsencrypt/live/netszukacz.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/netszukacz.pl/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback dla React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

# 3) API — https://api.netszukacz.pl -> Kong (Supabase)
server {
    listen 443 ssl http2;
    server_name api.netszukacz.pl;

    ssl_certificate     /etc/letsencrypt/live/netszukacz.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/netszukacz.pl/privkey.pem;

    client_max_body_size 50m;

    location / {
        proxy_pass http://kong:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket (realtime)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }
}

# 4) STUDIO — https://studio.netszukacz.pl (opcjonalnie; dodaj Basic Auth!)
server {
    listen 443 ssl http2;
    server_name studio.netszukacz.pl;

    ssl_certificate     /etc/letsencrypt/live/netszukacz.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/netszukacz.pl/privkey.pem;

    # auth_basic "Studio";
    # auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        proxy_pass http://studio:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
