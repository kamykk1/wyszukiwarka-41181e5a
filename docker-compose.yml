##############################################################################
# docker-compose.yml — netszukacz.pl
#
# Stack: Nginx (frontend SPA + reverse proxy) + Supabase self-hosted
# (Postgres, Kong API Gateway, GoTrue Auth, PostgREST, Realtime, Storage,
#  Edge Functions, Studio, Meta, Analytics, Vector, Imgproxy)
#
# Uzycie:
#   1) cp .env.example .env  (wypełnij sekrety — patrz sekcja ENV niżej)
#   2) npm run build          (zbuduj frontend do ./dist)
#   3) docker compose up -d
#
# Domeny (skonfiguruj DNS A -> IP VPS):
#   - https://netszukacz.pl        -> frontend  (nginx :80/:443)
#   - https://api.netszukacz.pl    -> Supabase API Gateway (Kong :8000)
#   - https://studio.netszukacz.pl -> Supabase Studio (opcjonalnie, chroń Basic Auth)
#
# SSL: użyj certbota na hoście (patrz VPS_INSTALLATION_GUIDE.md, sekcja 9)
#      lub Traefik/Caddy jako reverse proxy zamiast nginx w tym pliku.
##############################################################################

name: netszukacz

x-restart: &restart
  restart: unless-stopped

networks:
  netszukacz:
    driver: bridge

volumes:
  db-data:
  storage-data:
  functions-data:

services:

  # ───────────────────────────────────────────────────────────────────────────
  # FRONTEND — React SPA (Vite build) serwowany przez Nginx
  # ───────────────────────────────────────────────────────────────────────────
  frontend:
    <<: *restart
    image: nginx:1.27-alpine
    container_name: netszukacz-frontend
    depends_on:
      - kong
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx/netszukacz.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks: [netszukacz]

  # ───────────────────────────────────────────────────────────────────────────
  # SUPABASE — Postgres
  # ───────────────────────────────────────────────────────────────────────────
  db:
    <<: *restart
    image: supabase/postgres:15.8.1.060
    container_name: netszukacz-db
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      POSTGRES_HOST: /var/run/postgresql
      POSTGRES_PORT: 5432
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGPORT: 5432
      PGPASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: 3600
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d/migrations:ro
    networks: [netszukacz]

  # ───────────────────────────────────────────────────────────────────────────
  # SUPABASE — Kong API Gateway (główny endpoint API)
  # ───────────────────────────────────────────────────────────────────────────
  kong:
    <<: *restart
    image: kong:2.8.1
    container_name: netszukacz-kong
    depends_on:
      db: { condition: service_healthy }
    ports:
      - "8000:8000/tcp"
      - "8443:8443/tcp"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
    volumes:
      - ./supabase/kong.yml:/home/kong/kong.yml:ro
    networks: [netszukacz]

  # ───────────────────────────────────────────────────────────────────────────
  # SUPABASE — GoTrue (Auth)
  # ───────────────────────────────────────────────────────────────────────────
  auth:
    <<: *restart
    image: supabase/gotrue:v2.164.0
    container_name: netszukacz-auth
    depends_on:
      db: { condition: service_healthy }
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: https://api.netszukacz.pl
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      GOTRUE_SITE_URL: https://netszukacz.pl
      GOTRUE_URI_ALLOW_LIST: https://netszukacz.pl,https://netszukacz.pl/*
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "false"
      GOTRUE_SMTP_HOST: ${SMTP_HOST}
      GOTRUE_SMTP_PORT: ${SMTP_PORT}
      GOTRUE_SMTP_USER: ${SMTP_USER}
      GOTRUE_SMTP_PASS: ${SMTP_PASS}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL}
      GOTRUE_SMTP_SENDER_NAME: "netszukacz.pl"
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: "true"
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: https://api.netszukacz.pl/auth/v1/callback
    networks: [netszukacz]

  # ───────────────────────────────────────────────────────────────────────────
  # SUPABASE — PostgREST (REST API dla tabel/RPC)
  # ───────────────────────────────────────────────────────────────────────────
  rest:
    <<: *restart
    image: postgrest/postgrest:v12.2.3
    container_name: netszukacz-rest
    depends_on:
      db: { condition: service_healthy }
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMAS: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: 3600
    networks: [netszukacz]

  # ───────────────────────────────────────────────────────────────────────────
  # SUPABASE — Realtime (WebSocket)
  # ───────────────────────────────────────────────────────────────────────────
  realtime:
    <<: *restart
    image: supabase/realtime:v2.33.70
    container_name: netszukacz-realtime
    depends_on:
      db: { condition: service_healthy }
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: postgres
      DB_AFTER_CONNECT_QUERY: 'SET search_path TO _realtime'
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      ERL_AFLAGS: -proto_dist inet_tcp
      DNS_NODES: "''"
      RLIMIT_NOFILE: "10000"
      APP_NAME: realtime
      SEED_SELF_HOST: "true"
      RUN_JANITOR: "true"
    networks: [netszukacz]

  # ───────────────────────────────────────────────────────────────────────────
  # SUPABASE — Storage (pliki, np. email-assets)
  # ───────────────────────────────────────────────────────────────────────────
  storage:
    <<: *restart
    image: supabase/storage-api:v1.11.13
    container_name: netszukacz-storage
    depends_on:
      db: { condition: service_healthy }
      rest: { condition: service_started }
      imgproxy: { condition: service_started }
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://imgproxy:5001
    volumes:
      - storage-data:/var/lib/storage
    networks: [netszukacz]

  imgproxy:
    <<: *restart
    image: darthsim/imgproxy:v3.8.0
    container_name: netszukacz-imgproxy
    environment:
      IMGPROXY_BIND: ":5001"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: "true"
    volumes:
      - storage-data:/var/lib/storage:ro
    networks: [netszukacz]

  # ───────────────────────────────────────────────────────────────────────────
  # SUPABASE — Edge Functions (Deno runtime)
  # Deployuje wszystkie funkcje z ./supabase/functions
  # ───────────────────────────────────────────────────────────────────────────
  functions:
    <<: *restart
    image: supabase/edge-runtime:v1.65.3
    container_name: netszukacz-functions
    depends_on:
      db: { condition: service_healthy }
    command:
      - start
      - --main-service
      - /home/deno/functions/main
    environment:
      JWT_SECRET: ${JWT_SECRET}
      SUPABASE_URL: http://kong:8000
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      SUPABASE_DB_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
      # Sekrety Twojej aplikacji:
      RESEND_API_KEY: ${RESEND_API_KEY}
      TRADEDOUBLER_TOKEN: ${TRADEDOUBLER_TOKEN}
      TRADEDOUBLER_WEBHOOK_SECRET: ${TRADEDOUBLER_WEBHOOK_SECRET}
      TRADEDOUBLER_CLIENT_ID: ${TRADEDOUBLER_CLIENT_ID}
      TRADEDOUBLER_CLIENT_SECRET: ${TRADEDOUBLER_CLIENT_SECRET}
      TRADEDOUBLER_USERNAME: ${TRADEDOUBLER_USERNAME}
      TRADEDOUBLER_PASSWORD: ${TRADEDOUBLER_PASSWORD}
      CRON_SECRET: ${CRON_SECRET}
      LOVABLE_API_KEY: ${LOVABLE_API_KEY}
    volumes:
      - ./supabase/functions:/home/deno/functions:ro
      - functions-data:/home/deno/.cache
    networks: [netszukacz]

  # ───────────────────────────────────────────────────────────────────────────
  # SUPABASE — Meta (introspekcja bazy dla Studio)
  # ───────────────────────────────────────────────────────────────────────────
  meta:
    <<: *restart
    image: supabase/postgres-meta:v0.84.2
    container_name: netszukacz-meta
    depends_on:
      db: { condition: service_healthy }
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    networks: [netszukacz]

  # ───────────────────────────────────────────────────────────────────────────
  # SUPABASE — Studio (panel admin bazy). Chroń Basic Auth w Kongu / Nginxie.
  # ───────────────────────────────────────────────────────────────────────────
  studio:
    <<: *restart
    image: supabase/studio:20241202-71e5240
    container_name: netszukacz-studio
    depends_on:
      meta: { condition: service_started }
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: netszukacz
      DEFAULT_PROJECT_NAME: netszukacz.pl
      SUPABASE_URL: https://api.netszukacz.pl
      SUPABASE_PUBLIC_URL: https://api.netszukacz.pl
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      LOGFLARE_URL: http://analytics:4000
      NEXT_PUBLIC_ENABLE_LOGS: "true"
    networks: [netszukacz]
